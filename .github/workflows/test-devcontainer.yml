name: Test devcontainer

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  devcontainer-python:
    name: python test devcontainer
    runs-on: komadori-runners

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Dev Container CLI
        run: npm install -g @devcontainers/cli

      # devcontainers/cli shells out to the standalone `docker-compose`
      # binary, which modern Docker no longer ships (it's now the `docker
      # compose` subcommand). Install the compose plugin and shim the old
      # binary name so the CLI can find it.
      - name: Install docker-compose
        run: |
          sudo apt-get update
          sudo apt-get install -y docker-compose-plugin
          sudo tee /usr/local/bin/docker-compose > /dev/null << 'SCRIPT'
          #!/usr/bin/env bash
          exec docker compose "$@"
          SCRIPT
          sudo chmod +x /usr/local/bin/docker-compose

      - name: Build and start devcontainer
        run: |
          devcontainer up \
            --workspace-folder tests/python

      - name: Run postAttachCommand
        run: |
          devcontainer exec \
            --workspace-folder tests/python \
            --remote-env DEVBASE_NO_MENU=1 \
            bash -lc "terminal 2>&1 | tee -a /tmp/devbase-ci.log"

      - name: Assert
        run: |
          devcontainer exec \
            --workspace-folder tests/python \
            bash /workspace/python-example/.devcontainer/ci-assert.sh

  devcontainer-node:
    name: node test devcontainer
    runs-on: komadori-runners

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Dev Container CLI
        run: npm install -g @devcontainers/cli

      # devcontainers/cli shells out to the standalone `docker-compose`
      # binary, which modern Docker no longer ships (it's now the `docker
      # compose` subcommand). Install the compose plugin and shim the old
      # binary name so the CLI can find it.
      - name: Install docker-compose
        run: |
          sudo apt-get update
          sudo apt-get install -y docker-compose-plugin
          sudo tee /usr/local/bin/docker-compose > /dev/null << 'SCRIPT'
          #!/usr/bin/env bash
          exec docker compose "$@"
          SCRIPT
          sudo chmod +x /usr/local/bin/docker-compose

      - name: Build and start devcontainer
        run: |
          devcontainer up \
            --workspace-folder tests/node

      - name: Run postAttachCommand
        run: |
          devcontainer exec \
            --workspace-folder tests/node \
            --remote-env DEVBASE_NO_MENU=1 \
            bash -lc "terminal 2>&1 | tee -a /tmp/devbase-ci.log"

      - name: Assert
        run: |
          devcontainer exec \
            --workspace-folder tests/node \
            bash /workspace/node-example/.devcontainer/ci-assert.sh
