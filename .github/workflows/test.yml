name: Test

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  hooks:
    name: hooks.bats
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install bats
        run: npm install -g bats

      - name: Run hooks tests
        run: bats tests/hooks/hooks.bats
