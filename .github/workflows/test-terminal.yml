name: Test terminal

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  terminal:
    name: terminal lib tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install bats
        run: sudo apt-get install -y bats

      - name: Run hooks tests
        run: bats tests/terminal/hooks.bats

      - name: Run menu tests
        run: bats tests/terminal/menu.bats

      - name: Run preset tests
        run: bats tests/terminal/preset.bats

      - name: Run git tests
        run: bats tests/terminal/git.bats
