name: Test terminal

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  terminal:
    name: hooks.bats
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install bats
        run: sudo apt-get install -y bats

      - name: Run hooks tests
        run: bats tests/terminal/hooks.bats
